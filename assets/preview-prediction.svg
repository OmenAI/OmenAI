<svg xmlns="http://www.w3.org/2000/svg" width="820" height="540" viewBox="0 0 820 540">
  <defs>
    <style>text { font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }</style>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#080b0f"/>
    </linearGradient>
    <linearGradient id="chartFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3fb950" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#3fb950" stop-opacity="0.02"/>
    </linearGradient>
    <linearGradient id="polyFill" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <rect x="1" y="1" width="818" height="538" rx="10" fill="none" stroke="#21262d" stroke-width="1.5"/>
  <rect width="820" height="540" rx="10" fill="url(#bg2)"/>

  <!-- Header -->
  <rect width="820" height="44" rx="10" fill="#111827"/>
  <rect y="34" width="820" height="10" fill="#111827"/>
  <circle cx="22" cy="22" r="7" fill="#ff5f57"/>
  <circle cx="44" cy="22" r="7" fill="#febc2e"/>
  <circle cx="66" cy="22" r="7" fill="#28c840"/>
  <text x="410" y="27" text-anchor="middle" fill="#6b7280" font-size="12" letter-spacing="2">OMEN  ·  PREDICTION DETAIL</text>

  <!-- Market title -->
  <text x="28" y="72" fill="#e6edf3" font-size="15" font-weight="bold">Will Trump sign the crypto bill before July 2026?</text>
  <rect x="28" y="80" width="72" height="15" rx="3" fill="#1f3a5c"/>
  <text x="64" y="91" fill="#58a6ff" font-size="10" text-anchor="middle">Politics</text>
  <rect x="108" y="80" width="100" height="15" rx="3" fill="#1a3a2a"/>
  <text x="158" y="91" fill="#3fb950" font-size="10" text-anchor="middle">US Crypto Policy</text>
  <text x="792" y="72" fill="#8b949e" font-size="11" text-anchor="end">closes Jul 1, 2026  ·  $2.1M volume</text>

  <!-- Probability comparison -->
  <rect x="16" y="104" width="370" height="100" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="28" y="122" fill="#484f58" font-size="10" letter-spacing="1">PROBABILITY</text>

  <!-- Polymarket bar -->
  <text x="28" y="143" fill="#58a6ff" font-size="11">Polymarket</text>
  <rect x="120" y="132" width="200" height="14" rx="3" fill="#1c2128"/>
  <rect x="120" y="132" width="68" height="14" rx="3" fill="#58a6ff" opacity="0.7"/>
  <text x="330" y="143" fill="#58a6ff" font-size="12" font-weight="bold">34%</text>

  <!-- AI bar -->
  <text x="28" y="167" fill="#3fb950" font-size="11">Omen AI</text>
  <rect x="120" y="156" width="200" height="14" rx="3" fill="#1c2128"/>
  <rect x="120" y="156" width="102" height="14" rx="3" fill="#3fb950" opacity="0.7"/>
  <text x="330" y="167" fill="#3fb950" font-size="12" font-weight="bold">51%</text>

  <!-- Edge -->
  <text x="28" y="192" fill="#484f58" font-size="11">Edge</text>
  <rect x="120" y="181" width="200" height="14" rx="3" fill="#1c2128"/>
  <rect x="120" y="181" width="34" height="14" rx="3" fill="#f0883e" opacity="0.8"/>
  <text x="330" y="192" fill="#f0883e" font-size="12" font-weight="bold">+17%</text>

