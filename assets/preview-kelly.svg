  <text x="392" y="94" font-family="'Courier New', monospace" font-size="8" fill="#22c55e">0.15×</text>

  <!-- Peak annotation -->
  <circle cx="352" cy="91" r="4" fill="#f59e0b" opacity="0.8"/>
  <line x1="352" y1="91" x2="352" y2="215" stroke="#f59e0b" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <text x="354" y="87" font-family="'Courier New', monospace" font-size="7" fill="#f59e0b">f*=0.15 (capped)</text>

