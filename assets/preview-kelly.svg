  <rect x="412" y="330" width="28" height="110" fill="#22c55e" opacity="0.4"/>
  <rect x="446" y="320" width="28" height="120" fill="#22c55e" opacity="0.45"/>
  <rect x="480" y="316" width="28" height="124" fill="#22c55e" opacity="0.5"/>
  <rect x="514" y="322" width="28" height="118" fill="#22c55e" opacity="0.45"/>
  <rect x="548" y="332" width="28" height="108" fill="#22c55e" opacity="0.4"/>
  <rect x="582" y="345" width="28" height="95" fill="#22c55e" opacity="0.35"/>
  <rect x="616" y="362" width="28" height="78" fill="#22c55e" opacity="0.3"/>
  <rect x="650" y="380" width="28" height="60" fill="#22c55e" opacity="0.25"/>
  <rect x="684" y="400" width="28" height="40" fill="#22c55e" opacity="0.2"/>
  <rect x="718" y="418" width="28" height="22" fill="#22c55e" opacity="0.15"/>
  <rect x="752" y="428" width="28" height="12" fill="#22c55e" opacity="0.1"/>

  <!-- X axis labels -->
  <text x="380" y="453" font-family="'Courier New', monospace" font-size="8" fill="#ef4444" text-anchor="middle">0%</text>
  <text x="245" y="453" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="middle">-15%</text>
  <text x="615" y="453" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="middle">+15%</text>
  <text x="760" y="453" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="middle">+25%</text>

  <!-- Footer -->
  <text x="450" y="505" font-family="'Courier New', monospace" font-size="8" fill="#ffffff12" text-anchor="middle">OMEN  •  POLYMARKET PREDICTION ENGINE  •  KELLY CRITERION + BRIER CALIBRATION  •  CLAUDE AGENT SDK</text>
</svg>
