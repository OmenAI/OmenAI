  <text x="74" y="170" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="end">0.05</text>
  <text x="74" y="120" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="end">0.10</text>
  <text x="74" y="95" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="end">0.15</text>
  <text x="72" y="70" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="end">f*</text>

  <!-- X axis labels -->
  <text x="80" y="227" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="middle">-10%</text>
  <text x="185" y="227" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="middle">0%</text>
  <text x="290" y="227" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="middle">+10%</text>
  <text x="380" y="227" font-family="'Courier New', monospace" font-size="8" fill="#ffffff30" text-anchor="middle">+20%</text>
  <text x="235" y="240" font-family="'Courier New', monospace" font-size="8" fill="#ffffff20" text-anchor="middle">edge  (p_model - p_implied)</text>

