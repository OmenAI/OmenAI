  <text x="660" y="228" font-family="'Courier New', monospace" font-size="7" fill="#ffffff30" text-anchor="middle">0.6</text>
  <text x="750" y="228" font-family="'Courier New', monospace" font-size="7" fill="#ffffff30" text-anchor="middle">0.8</text>
  <text x="660" y="242" font-family="'Courier New', monospace" font-size="8" fill="#ffffff20" text-anchor="middle">predicted probability</text>
  <text x="471" y="170" font-family="'Courier New', monospace" font-size="7" fill="#ffffff30" text-anchor="end">0.4</text>
  <text x="471" y="120" font-family="'Courier New', monospace" font-size="7" fill="#ffffff30" text-anchor="end">0.6</text>
  <text x="471" y="70" font-family="'Courier New', monospace" font-size="7" fill="#ffffff30" text-anchor="end">0.8</text>

