  <!-- Y axis -->
  <line x1="80" y1="65" x2="80" y2="215" stroke="#1e2d40" stroke-width="1"/>
  <!-- X axis -->
  <line x1="80" y1="215" x2="390" y2="215" stroke="#1e2d40" stroke-width="1"/>

  <!-- Grid lines -->
  <line x1="80" y1="165" x2="390" y2="165" stroke="#1e2d40" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="80" y1="115" x2="390" y2="115" stroke="#1e2d40" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="80" y1="90" x2="390" y2="90" stroke="#1e2d40" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="185" y1="65" x2="185" y2="215" stroke="#1e2d40" stroke-width="0.5" stroke-dasharray="2,3"/>
  <line x1="290" y1="65" x2="290" y2="215" stroke="#1e2d40" stroke-width="0.5" stroke-dasharray="2,3"/>

