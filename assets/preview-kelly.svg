  <polyline points="490,200 555,148 645,95 738,60 800,55" fill="none" stroke="#f59e0b" stroke-width="2"/>
  <text x="805" y="56" font-family="'Courier New', monospace" font-size="8" fill="#f59e0b">Political  B=0.24</text>

